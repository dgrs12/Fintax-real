<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Fintax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Fondo Negro/Azul Profundo solicitado */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #050505 0%, #0a0a1a 70%, #1a1a3a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ecf0f1;
            padding-bottom: 50px;
        }

        /* Contenedor Efecto Cristal */
        .login-card {
            background: rgba(10, 10, 10, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        /* 🔴 Alerta de Error */
        .error-alert {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        /* Estilos de los Inputs */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #bdc3c7;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        /* El Ojo de la Contraseña */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #bdc3c7;
            font-size: 18px;
            user-select: none;
        }
        .toggle-password:hover { color: #2ecc71; }

        /* Botón Principal */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            border: none;
            border-radius: 8px;
            color: #121212;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        
        .btn-submit:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        /* Enlaces Extra */
        .extra-links {
            margin-top: 25px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .extra-links a {
            color: #3498db;
            text-decoration: none;
            transition: 0.2s;
        }
        .extra-links a:hover { color: #2980b9; text-decoration: underline; }

        /* Carrusel de Frases AFUERA */
        .outside-quote-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            font-size: 14px;
            color: #b0b0b0;
            font-style: italic;
            transition: opacity 0.5s ease-in-out;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="login-title">Fintax 🐷</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors or messages %}
                <div class="error-alert">
                    ⚠️ Usuario o contraseña incorrectos. Intenta de nuevo.
                </div>
            {% endif %}
            
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit" class="btn-submit">Entrar a mi Billetera</button>
        </form>

        <div class="extra-links">
            <a href="{% url 'registro' %}">¿Eres nuevo aquí? Crea una cuenta</a>
            <a href="{% url 'password_reset' %}">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <div class="outside-quote-container" id="outside-quote-box">
        "El dinero es un excelente esclavo, pero un pésimo amo."
    </div>

    <script>
        // Lógica para mostrar/ocultar contraseña
        function togglePassword() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.querySelector(".toggle-password");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.textContent = "🙈"; 
            } else {
                passwordInput.type = "password";
                eyeIcon.textContent = "👁️"; 
            }
        }

        // Frases motivadoras Predeterminadas
        const frases = [
            '"El dinero es un excelente esclavo, pero un pésimo amo."',
            '"No ahorres lo que te sobra, gasta lo que te sobra después de ahorrar."',
            '"El interés compuesto es la octava maravilla del mundo."',
            '"La educación es la mejor inversión que puedes hacer."',
            '"Controla tus gastos o tus gastos te controlarán a ti."',
            '"Un centavo ahorrado es un centavo ganado."'
        ];

        let index = 0;
        const quoteBox = document.getElementById("outside-quote-box");

        // Carrusel automático cada 7 segundos
        setInterval(() => {
            quoteBox.style.opacity = 0;
            setTimeout(() => {
                index = (index + 1) % frases.length;
                quoteBox.textContent = frases[index];
                quoteBox.style.opacity = 1;
            }, 500); 
        }, 7000); 
    </script>

</body>
</html>
