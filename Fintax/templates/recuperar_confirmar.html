<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña | Fintax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #050505 0%, #0a0a1a 70%, #1a1a3a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #ecf0f1; }
        .login-card { background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); text-align: center; }
        .login-title { font-size: 24px; margin-bottom: 20px; font-weight: 700; }
        
        /* Estilos para el formulario de Django */
        form p { text-align: left; font-size: 13px; color: #bdc3c7; margin-bottom: 15px; }
        form input { width: 100%; padding: 12px; border-radius: 8px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); color: white; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; margin-top: 5px; }
        form input:focus { border-color: #3498db; box-shadow: 0 0 10px rgba(52, 152, 219, 0.3); }
        form ul { color: #e74c3c; font-size: 12px; text-align: left; padding-left: 15px; }

        .btn-submit { width: 100%; padding: 12px; background: #3498db; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-submit:hover { background: #2980b9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">Crea tu nueva contraseña 🐷</h1>
        
        {% if validlink %}
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Guardar Contraseña</button>
            </form>
        {% else %}
            <p style="color: #e74c3c;">El enlace de recuperación es inválido o ya expiró. Por favor solicita uno nuevo.</p>
            <a href="{% url 'recuperar' %}" class="btn-submit" style="text-decoration: none; display: inline-block; margin-top: 20px;">Solicitar nuevo enlace</a>
        {% endif %}
    </div>
</body>
</html>
